apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote

  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - name: vote
          image: santhosh0476/vote-app
          env:
            - name: REDIS_HOST
              value: "redis"
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: vote
spec:
  type: NodePort
  selector:
    app: vote
    
  ports:
    - port: 80
      targetPort: 80
