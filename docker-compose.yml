version: "3"
services:
  vote:
    build: /vote
    ports:
      - "5000:80"
    depends_on:
       - redis
  redis:
    image: redis
  worker:
    build: /worker
    depends_on:
      - redis
      - db
  db:
    image: postgres
    environment:
      POSTGRES_DB: votes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
  result:
    build: /result
    ports:
      - "5001:80"
    depends_on:
      - db
      